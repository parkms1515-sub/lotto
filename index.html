<!DOCTYPE html>
<html>
<head>
    <title>로또 명당 지도 (최적화 버전)</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; background-color: #f0f0f0; } 
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. 지도 초기화 (preferCanvas: true 옵션으로 성능 향상)
        var map = L.map('map', {
            preferCanvas: true 
        }).setView([36.5, 127.5], 7);

        // 2. 배경 지도 설정 (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. 마커 클러스터 그룹 생성
        var markers = L.markerClusterGroup();

        // 4. 데이터 불러오기
        fetch('lotto.geojson')
            .then(response => {
                if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                return response.json();
            })
            .then(data => {
                console.log("데이터 로드 완료: " + data.features.length + "개");

                // 5. 데이터 반복 처리
                data.features.forEach(function(feature) {
                    var lat = parseFloat(feature.properties.yy);
                    var lng = parseFloat(feature.properties.xx);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        // 상호명과 주소 추출
                        var name = feature.properties.field2 || "이름 없음";
                        var addr = feature.properties.field3 || "주소 없음";

                        // 마커 생성 및 팝업 설정
                        var marker = L.marker([lat, lng]);
                        marker.bindPopup("<b>" + name + "</b><br>" + addr);
                        
                        // 클러스터 그룹에 추가
                        markers.addLayer(marker);
                    }
                });

                // 6. 클러스터 그룹을 지도에 표시
                map.addLayer(markers);
                console.log("지도 표시 완료");
            })
            .catch(error => {
                console.error('에러 발생:', error);
                alert('데이터를 불러오는 중 오류가 발생했습니다. 콘솔을 확인하세요.');
            });
    </script>
</body>
</html>
